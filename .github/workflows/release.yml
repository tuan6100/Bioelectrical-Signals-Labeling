# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Biosignal Labeling App CI / Release

on:
  push:
    branches: [ "main" ]
    tags:
      - "v*"
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write
  actions: read
  checks: write
  deployments: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test (Node ${{ matrix.node-version }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]
        node-version: [24]
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Ensure npm lockfile is present
        shell: pwsh
        run: |
          if (-not (Test-Path -Path "package-lock.json")) { throw "package-lock.json is missing (required for npm ci)." }
          if (Test-Path -Path "pnpm-lock.yaml") { throw "pnpm-lock.yaml is present; remove it to avoid confusion after switching to npm." }

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Lint
        if: hashFiles('**/eslint.config.*', '**/.eslintrc*') != ''
        run: npm run lint

      - name: Run tests
        run: npm run test --if-present
        env:
          CI: true

      - name: Build and publish desktop application
        run: npm run publish:app -- --win --x64
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
